# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - cwAutomateServerUrl
      - cwAutomateUsername
      - cwAutomatePassword
      - cwAutomateClientId
    properties:
      cwAutomateServerUrl:
        type: string
        description: Your ConnectWise Automate server URL
      cwAutomateUsername:
        type: string
        description: Your ConnectWise Automate username
      cwAutomatePassword:
        type: string
        description: Your ConnectWise Automate password
      cwAutomateClientId:
        type: string
        description: Your ConnectWise Automate API client ID
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { CW_AUTOMATE_SERVER_URL: config.cwAutomateServerUrl, CW_AUTOMATE_USERNAME: config.cwAutomateUsername, CW_AUTOMATE_PASSWORD: config.cwAutomatePassword, CW_AUTOMATE_CLIENT_ID: config.cwAutomateClientId, MCP_TRANSPORT: 'stdio' } })
